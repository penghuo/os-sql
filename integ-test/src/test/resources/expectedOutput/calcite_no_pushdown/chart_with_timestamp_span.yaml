calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(@timestamp=[$0], count=[$1])
        LogicalSort(sort0=[$2], dir0=[ASC])
          LogicalProject(@timestamp=[$0], count=[$1], EXPR$2=[SPAN($0, 1, 'd')])
            LogicalAggregate(group=[{0}], count=[COUNT()])
              LogicalProject(@timestamp=[SPAN($0, 1, 'd')])
                LogicalFilter(condition=[IS NOT NULL($0)])
                  LogicalProject(@timestamp=[$0], category=[$1], value=[$2], timestamp=[$3], _id=[$4], _index=[$5], _score=[$6], _maxscore=[$7], _sort=[$8], _routing=[$9])
                    CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_time_data]])
  physical: |
    EnumerableCalc(expr#0..2=[{inputs}], proj#0..1=[{exprs}])
      EnumerableLimit(fetch=[10000])
        EnumerableSort(sort0=[$2], dir0=[ASC])
          EnumerableCalc(expr#0..1=[{inputs}], expr#2=[1], expr#3=['d'], expr#4=[SPAN($t0, $t2, $t3)], proj#0..1=[{exprs}], EXPR$2=[$t4])
            EnumerableAggregate(group=[{0}], count=[COUNT()])
              EnumerableCalc(expr#0..10=[{inputs}], expr#11=[1], expr#12=['d'], expr#13=[SPAN($t0, $t11, $t12)], expr#14=[IS NOT NULL($t0)], @timestamp=[$t13], $condition=[$t14])
                CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_time_data]])
