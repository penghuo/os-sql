calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(age=[$0])
        LogicalSort(sort0=[$1], dir0=[ASC-nulls-first])
          LogicalProject(age=[$10], EXPR$1=[+($10, $7)])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableCalc(expr#0..1=[{inputs}], age=[$t0])
      EnumerableLimit(fetch=[10000])
        EnumerableSort(sort0=[$1], dir0=[ASC-nulls-first])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[+($t10, $t7)], age=[$t10], EXPR$1=[$t20])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
