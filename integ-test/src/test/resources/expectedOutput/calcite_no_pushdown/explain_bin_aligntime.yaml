calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(fetch=[5])
        LogicalProject(category=[$1], value=[$2], timestamp=[$3], @timestamp=[FROM_UNIXTIME(*(*(FLOOR(DIVIDE(DIVIDE(UNIX_TIMESTAMP($0), 3600), 2)), 2), 3600))])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_time_data]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..10=[{inputs}], expr#11=[UNIX_TIMESTAMP($t0)], expr#12=[3600], expr#13=[DIVIDE($t11, $t12)], expr#14=[2], expr#15=[DIVIDE($t13, $t14)], expr#16=[FLOOR($t15)], expr#17=[*($t16, $t14)], expr#18=[*($t17, $t12)], expr#19=[FROM_UNIXTIME($t18)], category=[$t1], value=[$t2], timestamp=[$t3], @timestamp=[$t19])
        EnumerableLimit(fetch=[5])
          CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_time_data]])
