calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(fetch=[5])
        LogicalProject(account_number=[$0], firstname=[$1], address=[$2], balance=[$3], gender=[$4], city=[$5], employer=[$6], state=[$7], age=[$8], email=[$9], lastname=[$10], initial=[REX_EXTRACT($10, '(?<initial>^[A-Z])', 'initial')])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..17=[{inputs}], expr#18=['(?<initial>^[A-Z])'], expr#19=['initial'], expr#20=[REX_EXTRACT($t10, $t18, $t19)], proj#0..10=[{exprs}], initial=[$t20])
        EnumerableLimit(fetch=[5])
          CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
