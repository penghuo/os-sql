calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalFilter(condition=[<($0, PPL_TIME('2018-11-09 19:00:00.123456789'))])
        LogicalFilter(condition=[>($0, PPL_TIME('2016-12-08 12:00:00.123456789'))])
          LogicalProject(custom_time=[$49])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_date_formats]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..95=[{inputs}], expr#96=[Sarg[('12:00:00.123456789':VARCHAR..'19:00:00.123456789':VARCHAR)]:VARCHAR], expr#97=[SEARCH($t49, $t96)], custom_time=[$t49], $condition=[$t97])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_date_formats]])
