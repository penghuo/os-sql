calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(avg(balance)=[$1], age_range=[$0])
        LogicalAggregate(group=[{0}], avg(balance)=[AVG($1)])
          LogicalProject(age_range=[CASE(<($10, 30), 'u30':VARCHAR, SEARCH($10, Sarg[[35..40), [80..+∞)]), '30-40 or >=80':VARCHAR, null:VARCHAR)], balance=[$7])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..2=[{inputs}], expr#3=[0], expr#4=[=($t2, $t3)], expr#5=[null:BIGINT], expr#6=[CASE($t4, $t5, $t1)], expr#7=[CAST($t6):DOUBLE], expr#8=[/($t7, $t2)], avg(balance)=[$t8], age_range=[$t0])
        EnumerableAggregate(group=[{0}], agg#0=[$SUM0($1)], agg#1=[COUNT($1)])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[30], expr#21=[<($t10, $t20)], expr#22=['u30':VARCHAR], expr#23=[Sarg[[35..40), [80..+∞)]], expr#24=[SEARCH($t10, $t23)], expr#25=['30-40 or >=80':VARCHAR], expr#26=[null:VARCHAR], expr#27=[CASE($t21, $t22, $t24, $t25, $t26)], age_range=[$t27], balance=[$t7])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
