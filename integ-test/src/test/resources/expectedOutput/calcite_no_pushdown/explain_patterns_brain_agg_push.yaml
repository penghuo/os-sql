calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(patterns_field=[CAST(ITEM($1, 'pattern')):VARCHAR], pattern_count=[CAST(ITEM($1, 'pattern_count')):BIGINT], tokens=[CAST(ITEM($1, 'tokens')):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP], sample_logs=[ITEM(CAST($1):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP NOT NULL, 'sample_logs')])
        LogicalCorrelate(correlation=[$cor1], joinType=[inner], requiredColumns=[{0}])
          LogicalAggregate(group=[{}], patterns_field=[pattern($0, $1, $2, $3)])
            LogicalProject(email=[$9], $f1=[10], $f2=[100000], $f3=[true])
              CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
          LogicalProject(patterns_field=[$0])
            Uncollect
              LogicalProject(EXPR$0=[$cor1.patterns_field])
                LogicalValues(tuples=[[{ 0 }]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..1=[{inputs}], expr#2=['pattern'], expr#3=[ITEM($t1, $t2)], expr#4=[CAST($t3):VARCHAR], expr#5=['pattern_count'], expr#6=[ITEM($t1, $t5)], expr#7=[CAST($t6):BIGINT], expr#8=['tokens'], expr#9=[ITEM($t1, $t8)], expr#10=[CAST($t9):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP], expr#11=[CAST($t1):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP NOT NULL], expr#12=['sample_logs'], expr#13=[ITEM($t11, $t12)], patterns_field=[$t4], pattern_count=[$t7], tokens=[$t10], sample_logs=[$t13])
        EnumerableCorrelate(correlation=[$cor1], joinType=[inner], requiredColumns=[{0}])
          EnumerableAggregate(group=[{}], patterns_field=[pattern($0, $1, $2, $3)])
            EnumerableCalc(expr#0..17=[{inputs}], expr#18=[10], expr#19=[100000], expr#20=[true], email=[$t9], $f1=[$t18], $f2=[$t19], $f3=[$t20])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
          EnumerableUncollect
            EnumerableCalc(expr#0=[{inputs}], expr#1=[$cor1], expr#2=[$t1.patterns_field], EXPR$0=[$t2])
              EnumerableValues(tuples=[[{ 0 }]])
