calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalFilter(condition=[<($0, PPL_DATE('2018-11-09 00:00:00.000000000'))])
        LogicalFilter(condition=[>($0, PPL_DATE('2016-12-08 00:00:00.123456789'))])
          LogicalProject(yyyy-MM-dd=[$83])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_date_formats]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..95=[{inputs}], expr#96=[Sarg[('2016-12-08':VARCHAR..'2018-11-09':VARCHAR)]:VARCHAR], expr#97=[SEARCH($t83, $t96)], yyyy-MM-dd=[$t83], $condition=[$t97])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_date_formats]])
