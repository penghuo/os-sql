setup:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled : true

---
teardown:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled : false

---
"Test _MAP.v access, filter, and stats":
  - skip:
      features:
        - headers
  - do:
      indices.create:
        index: test
        body:
          mappings:
            dynamic: false
            properties:
              v:
                type: integer

  - do:
      bulk:
        index: test
        refresh: true
        body:
          - '{"index": {"_id": 1}}'
          - '{"v": 1, "a": "1"}'
          - '{"index": {"_id": 2}}'
          - '{"v": 2, "b": "2"}'
          - '{"index": {"_id": 3}}'
          - '{"v": 3, "c": "3"}'

  # Test-1: fields _MAP.v
  - do:
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: "source=test | sort v | fields _MAP.v"
  - match: { total: 3 }
  - length: { datarows: 3 }
  - match: { datarows.0.0: 1 }
  - match: { datarows.1.0: 2 }
  - match: { datarows.2.0: 3 }

  # Test-2: where _MAP.v=1
  - do:
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: "source=test | where _MAP.v=1 | fields _MAP.v"
  - match: { total: 1 }
  - length: { datarows: 1 }
  - match: { datarows.0.0: 1 }

  # Test-3: stats count by _MAP.v
  - do:
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: "source=test | stats count by _MAP.v | sort _MAP.v"
  - match: { total: 3 }
  - length: { datarows: 3 }
  - match: { datarows.0.0: 1 }
  - match: { datarows.0.1: 1 }
  - match: { datarows.1.0: 2 }
  - match: { datarows.1.1: 1 }
  - match: { datarows.2.0: 3 }
  - match: { datarows.2.1: 1 }
