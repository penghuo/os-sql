calcite:
  logical: |
    LogicalSystemLimit(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(sort0=[$0], dir0=[ASC-nulls-first])
        LogicalProject(age=[$8])
          LogicalSort(sort0=[$3], dir0=[ASC-nulls-first], fetch=[5])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    CalciteEnumerableTopK(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000])
      CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]], PushDownContext=[[PROJECT->[balance, age], SORT->[{
      "balance" : {
        "order" : "asc",
        "missing" : "_first"
      }
    }], LIMIT->5, PROJECT->[age]], OpenSearchRequestBuilder(sourceBuilder={"from":0,"size":5,"timeout":"1m","_source":{"includes":["age"]},"sort":[{"balance":{"order":"asc","missing":"_first"}}]}, requestedTotalSize=5, pageSize=null, startFrom=0)])
