calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(author=[$0])
        LogicalFilter(condition=[AND(>=($4, 4), <($4, 6), =($6, 'The Shining'))])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_cascaded_nested]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..14=[{inputs}], expr#15=[Sarg[[4..6)]], expr#16=[SEARCH($t4, $t15)], expr#17=['The Shining':VARCHAR], expr#18=[=($t6, $t17)], expr#19=[AND($t16, $t18)], author=[$t0], $condition=[$t19])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_cascaded_nested]])
