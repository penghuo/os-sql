calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(account_number=[$0], firstname=[$1], address=[$2], balance=[$3], gender=[$4], city=[$5], employer=[$6], state=[$7], age=[$8], email=[$9], lastname=[$10], patterns_field=[CASE(SEARCH($9, Sarg['':VARCHAR; NULL AS TRUE]:VARCHAR), '':VARCHAR, REGEXP_REPLACE($9, '[a-zA-Z0-9]+', '<*>'))])
        CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..17=[{inputs}], expr#18=[Sarg['':VARCHAR; NULL AS TRUE]:VARCHAR], expr#19=[SEARCH($t9, $t18)], expr#20=['':VARCHAR], expr#21=['[a-zA-Z0-9]+'], expr#22=['<*>'], expr#23=[REGEXP_REPLACE($t9, $t21, $t22)], expr#24=[CASE($t19, $t20, $t23)], proj#0..10=[{exprs}], patterns_field=[$t24])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
