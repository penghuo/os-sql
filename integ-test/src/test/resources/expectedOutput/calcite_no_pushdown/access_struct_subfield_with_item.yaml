calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(host=[$0], info=[GEOIP('dummy-datasource', $0)], info.dummy_sub_field=[ITEM(GEOIP('dummy-datasource', $0), 'dummy_sub_field')])
        CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_weblogs]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..12=[{inputs}], expr#13=['dummy-datasource'], expr#14=[GEOIP($t13, $t0)], expr#15=['dummy_sub_field'], expr#16=[ITEM($t14, $t15)], host=[$t0], info=[$t14], info.dummy_sub_field=[$t16])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_weblogs]])
