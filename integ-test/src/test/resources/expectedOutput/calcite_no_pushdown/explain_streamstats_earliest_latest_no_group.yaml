calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(created_at=[$0], server=[$1], @timestamp=[$2], message=[$3], level=[$4], earliest_message=[$5], latest_message=[$6])
        LogicalSort(sort0=[$7], dir0=[ASC])
          LogicalProject(created_at=[$0], server=[$1], @timestamp=[$2], message=[$3], level=[$4], earliest_message=[MIN_BY($3, $2) OVER (ORDER BY $12 NULLS LAST ROWS UNBOUNDED PRECEDING)], latest_message=[MAX_BY($3, $2) OVER (ORDER BY $12 NULLS LAST ROWS UNBOUNDED PRECEDING)], __stream_seq__=[$12])
            LogicalProject(created_at=[$0], server=[$1], @timestamp=[$2], message=[$3], level=[$4], _id=[$5], _index=[$6], _score=[$7], _maxscore=[$8], _sort=[$9], _routing=[$10], _highlight=[$11], __win_0=[ROW_NUMBER() OVER ()])
              CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_logs]])
  physical: |
    EnumerableCalc(expr#0..14=[{inputs}], proj#0..4=[{exprs}], earliest_message=[$t13], latest_message=[$t14])
      EnumerableLimit(fetch=[10000])
        EnumerableSort(sort0=[$12], dir0=[ASC])
          EnumerableWindow(window#0=[window(order by [12] rows between UNBOUNDED PRECEDING and CURRENT ROW aggs [MIN_BY($3, $2), MAX_BY($3, $2)])])
            EnumerableWindow(window#0=[window(rows between UNBOUNDED PRECEDING and CURRENT ROW aggs [ROW_NUMBER()])])
              CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_logs]])
