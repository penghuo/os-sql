setup:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled : true

---
teardown:
  - do:
      query.settings:
        body:
          transient:
            plugins.calcite.enabled : false

---
"Test field access with fields command":
  - skip:
      features:
        - headers
        - allowed_warnings
  - do:
      indices.create:
        index: test
        body:
          mappings:
            "dynamic": false
            properties:
              "@timestamp":
                type: date

  - do:
      bulk:
        index: test
        refresh: true
        body:
          - '{"index": {"_id": 1}}'
          - '{"@timestamp":"2025-08-19T04:53:24Z", "v":1, "a":"1"}'
          - '{"index": {"_id": 2}}'
          - '{"@timestamp":"2025-08-20T04:53:24Z", "v":2, "b":"2"}'

  - do:
      headers:
        Content-Type: 'application/json'
      ppl:
        body:
          query: "search source=test | fields v, a, b"

  # Basic assertions - expecting 2 total results
  - match: { total: 2 }

  # Test that the response contains datarows
  - is_true: datarows
  - length: { datarows: 2 }
  - match: { datarows.0: [1, "1", null]}
  - match: { datarows.1: [2, null, "2"]}
  - match: { size: 2 }
