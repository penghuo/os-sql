calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(firstname=[$1], age=[$8])
        LogicalFilter(condition=[AND(=(CHAR_LENGTH($1), 5), =(ABS($8), 32), =($3, 39225))])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..17=[{inputs}], expr#18=[CHAR_LENGTH($t1)], expr#19=[5], expr#20=[=($t18, $t19)], expr#21=[ABS($t8)], expr#22=[32:BIGINT], expr#23=[=($t21, $t22)], expr#24=[39225:BIGINT], expr#25=[=($t3, $t24)], expr#26=[AND($t20, $t23, $t25)], firstname=[$t1], age=[$t8], $condition=[$t26])
        CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
