calcite:
  logical: |
    LogicalSystemLimit(sort0=[$0], dir0=[ASC], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(sort0=[$0], dir0=[ASC])
        LogicalAggregate(group=[{0}], max(balance)=[MAX($1)])
          LogicalProject(age=[SPAN($10, 10, null:ANY)], balance=[$7])
            LogicalFilter(condition=[AND(IS NOT NULL($10), IS NOT NULL($7))])
              LogicalProject(account_number=[$0], firstname=[$1], address=[$2], birthdate=[$3], gender=[$4], city=[$5], lastname=[$6], balance=[$7], employer=[$8], state=[$9], age=[$10], email=[$11], male=[$12], _id=[$13], _index=[$14], _score=[$15], _maxscore=[$16], _sort=[$17], _routing=[$18])
                CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableSort(sort0=[$0], dir0=[ASC])
        EnumerableAggregate(group=[{0}], max(balance)=[MAX($1)])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[10], expr#21=[null:ANY], expr#22=[SPAN($t10, $t20, $t21)], expr#23=[IS NOT NULL($t10)], expr#24=[IS NOT NULL($t7)], expr#25=[AND($t23, $t24)], age=[$t22], balance=[$t7], $condition=[$t25])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
