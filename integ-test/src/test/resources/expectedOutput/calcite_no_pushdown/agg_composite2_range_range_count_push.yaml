calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(avg_balance=[$3], age_range=[$0], balance_range=[$1], state=[$2])
        LogicalAggregate(group=[{0, 1, 2}], avg_balance=[AVG($3)])
          LogicalProject(age_range=[CASE(<($10, 35), 'u35':VARCHAR, 'a35':VARCHAR)], balance_range=[CASE(<($7, 20000), 'medium':VARCHAR, 'high':VARCHAR)], state=[$9], balance=[$7])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..4=[{inputs}], expr#5=[0], expr#6=[=($t4, $t5)], expr#7=[null:BIGINT], expr#8=[CASE($t6, $t7, $t3)], expr#9=[CAST($t8):DOUBLE], expr#10=[/($t9, $t4)], avg_balance=[$t10], age_range=[$t0], balance_range=[$t1], state=[$t2])
        EnumerableAggregate(group=[{0, 1, 2}], agg#0=[$SUM0($3)], agg#1=[COUNT($3)])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[35], expr#21=[<($t10, $t20)], expr#22=['u35':VARCHAR], expr#23=['a35':VARCHAR], expr#24=[CASE($t21, $t22, $t23)], expr#25=[20000:BIGINT], expr#26=[<($t7, $t25)], expr#27=['medium':VARCHAR], expr#28=['high':VARCHAR], expr#29=[CASE($t26, $t27, $t28)], age_range=[$t24], balance_range=[$t29], state=[$t9], balance=[$t7])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
