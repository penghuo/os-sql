version: '3.8'

# 3-node OpenSearch cluster for ClickBench multi-node benchmark.
# Each node runs the SQL plugin with Trino enabled.
# Iceberg warehouse is mounted read-only from the host.
#
# Usage:
#   export PLUGIN_ZIP=$(ls plugin/build/distributions/opensearch-sql-*.zip)
#   export ICEBERG_WAREHOUSE=/tmp/iceberg-clickbench-warehouse
#   docker compose -f trino/benchmark/docker/docker-compose.yml up -d
#
# Requires:
#   - Plugin built: ./gradlew :opensearch-sql-plugin:bundlePlugin
#   - Iceberg warehouse created: python3 trino/benchmark/create_iceberg_table.py

services:
  opensearch-node1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PLUGIN_ZIP=${PLUGIN_ZIP:-plugin/build/distributions/opensearch-sql-3.6.0.0-SNAPSHOT.zip}
    container_name: opensearch-node1
    environment:
      - cluster.name=clickbench-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms16g -Xmx16g -Dtrino.iceberg.warehouse=/data/iceberg-warehouse"
      - plugins.trino.enabled=true
      - plugins.trino.catalog.iceberg.warehouse=/data/iceberg-warehouse
      - plugins.security.disabled=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${ICEBERG_WAREHOUSE:-/tmp/iceberg-clickbench-warehouse}:/data/iceberg-warehouse:ro
    ports:
      - "19200:9200"
    networks:
      - opensearch-net

  opensearch-node2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PLUGIN_ZIP=${PLUGIN_ZIP:-plugin/build/distributions/opensearch-sql-3.6.0.0-SNAPSHOT.zip}
    container_name: opensearch-node2
    environment:
      - cluster.name=clickbench-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms16g -Xmx16g -Dtrino.iceberg.warehouse=/data/iceberg-warehouse"
      - plugins.trino.enabled=true
      - plugins.trino.catalog.iceberg.warehouse=/data/iceberg-warehouse
      - plugins.security.disabled=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${ICEBERG_WAREHOUSE:-/tmp/iceberg-clickbench-warehouse}:/data/iceberg-warehouse:ro
    networks:
      - opensearch-net

  opensearch-node3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PLUGIN_ZIP=${PLUGIN_ZIP:-plugin/build/distributions/opensearch-sql-3.6.0.0-SNAPSHOT.zip}
    container_name: opensearch-node3
    environment:
      - cluster.name=clickbench-cluster
      - node.name=opensearch-node3
      - discovery.seed_hosts=opensearch-node1,opensearch-node2,opensearch-node3
      - cluster.initial_cluster_manager_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms16g -Xmx16g -Dtrino.iceberg.warehouse=/data/iceberg-warehouse"
      - plugins.trino.enabled=true
      - plugins.trino.catalog.iceberg.warehouse=/data/iceberg-warehouse
      - plugins.security.disabled=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${ICEBERG_WAREHOUSE:-/tmp/iceberg-clickbench-warehouse}:/data/iceberg-warehouse:ro
    networks:
      - opensearch-net

networks:
  opensearch-net:
