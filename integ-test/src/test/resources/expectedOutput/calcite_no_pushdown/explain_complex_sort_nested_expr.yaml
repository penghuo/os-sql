calcite:
  logical: |
    LogicalSystemLimit(sort0=[$14], dir0=[ASC-nulls-first], fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalSort(sort0=[$14], dir0=[ASC-nulls-first])
        LogicalProject(account_number=[$0], firstname=[$1], address=[$2], birthdate=[$3], gender=[$4], city=[$5], lastname=[$6], balance=[$7], employer=[$8], state=[$9], age=[$10], email=[$11], male=[$12], age2=[+($10, $7)], age3=[-(+($10, $7), $10)])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableSort(sort0=[$14], dir0=[ASC-nulls-first])
        EnumerableCalc(expr#0..19=[{inputs}], expr#20=[+($t10, $t7)], expr#21=[-($t20, $t10)], proj#0..12=[{exprs}], age2=[$t20], age3=[$t21])
          CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
