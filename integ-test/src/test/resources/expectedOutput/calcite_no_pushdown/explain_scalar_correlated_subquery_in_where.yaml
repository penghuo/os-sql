calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(id=[$2], name=[$0])
        LogicalFilter(condition=[=($2, $SCALAR_QUERY({
    LogicalAggregate(group=[{}], max(uid)=[MAX($0)])
      LogicalProject(uid=[$1])
        LogicalFilter(condition=[=($cor1.id, $1)])
          CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_work_information]])
    }))], variablesSet=[[$cor1]])
          LogicalProject(name=[$0], country=[$1], id=[$2], occupation=[$3], salary=[$4], _id=[$5], _index=[$6], _score=[$7], _maxscore=[$8], _sort=[$9], _routing=[$10])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_worker]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..1=[{inputs}], id=[$t1], name=[$t0])
        EnumerableHashJoin(condition=[=($1, $2)], joinType=[semi])
          EnumerableCalc(expr#0..11=[{inputs}], name=[$t0], id=[$t2])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_worker]])
          EnumerableCalc(expr#0..1=[{inputs}], expr#2=[=($t0, $t1)], proj#0..1=[{exprs}], $condition=[$t2])
            EnumerableAggregate(group=[{1}], max(uid)=[MAX($1)])
              EnumerableCalc(expr#0..10=[{inputs}], expr#11=[IS NOT NULL($t1)], proj#0..10=[{exprs}], $condition=[$t11])
                CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_work_information]])
