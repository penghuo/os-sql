calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(avg_balance=[$2], age_range=[$0], balance_range=[$1])
        LogicalAggregate(group=[{0, 1}], avg_balance=[AVG($2)])
          LogicalProject(age_range=[CASE(<($10, 30), 'u30':VARCHAR, <($10, 40), 'u40':VARCHAR, 'u100':VARCHAR)], balance_range=[CASE(<($7, 20000), 'medium':VARCHAR, 'high':VARCHAR)], balance=[$7])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..3=[{inputs}], expr#4=[0], expr#5=[=($t3, $t4)], expr#6=[null:BIGINT], expr#7=[CASE($t5, $t6, $t2)], expr#8=[CAST($t7):DOUBLE], expr#9=[/($t8, $t3)], avg_balance=[$t9], age_range=[$t0], balance_range=[$t1])
        EnumerableAggregate(group=[{0, 1}], agg#0=[$SUM0($2)], agg#1=[COUNT($2)])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[30], expr#21=[<($t10, $t20)], expr#22=['u30':VARCHAR], expr#23=[40], expr#24=[<($t10, $t23)], expr#25=['u40':VARCHAR], expr#26=['u100':VARCHAR], expr#27=[CASE($t21, $t22, $t24, $t25, $t26)], expr#28=[20000:BIGINT], expr#29=[<($t7, $t28)], expr#30=['medium':VARCHAR], expr#31=['high':VARCHAR], expr#32=[CASE($t29, $t30, $t31)], age_range=[$t27], balance_range=[$t32], balance=[$t7])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
