# Override oshi configuration to prevent reading /proc and /sys paths
# which are blocked by OpenSearch's Java Agent security policy.
#
# IMPORTANT: These property keys use the RELOCATED package prefix because
# the Shadow plugin relocates all "oshi." string literals in the bytecode.
# The GlobalConfig class looks up "org.opensearch.sql.trino.shaded.oshi.util.proc.path"
# (not "oshi.util.proc.path") after relocation.
org.opensearch.sql.trino.shaded.oshi.util.proc.path=/dev/null
org.opensearch.sql.trino.shaded.oshi.os.linux.allowudev=false
