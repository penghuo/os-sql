calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(patterns_field=[CAST(ITEM(PATTERN_PARSER($0, $1), 'pattern')):VARCHAR], pattern_count=[$2], tokens=[CAST(ITEM(PATTERN_PARSER($0, $1), 'tokens')):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP], sample_logs=[$1])
        LogicalAggregate(group=[{0}], sample_logs=[TAKE($1, $2)], pattern_count=[COUNT($0)])
          LogicalProject($f0=[CASE(SEARCH($9, Sarg['':VARCHAR; NULL AS TRUE]:VARCHAR), '':VARCHAR, REGEXP_REPLACE($9, '[a-zA-Z0-9]+', '<*>'))], email=[$9], $f2=[10])
            CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..2=[{inputs}], expr#3=[PATTERN_PARSER($t0, $t1)], expr#4=['pattern'], expr#5=[ITEM($t3, $t4)], expr#6=[CAST($t5):VARCHAR], expr#7=['tokens'], expr#8=[ITEM($t3, $t7)], expr#9=[CAST($t8):(VARCHAR NOT NULL, VARCHAR ARRAY) MAP], patterns_field=[$t6], pattern_count=[$t2], tokens=[$t9], sample_logs=[$t1])
        EnumerableAggregate(group=[{0}], sample_logs=[TAKE($1, $2)], pattern_count=[COUNT($0)])
          EnumerableCalc(expr#0..17=[{inputs}], expr#18=[Sarg['':VARCHAR; NULL AS TRUE]:VARCHAR], expr#19=[SEARCH($t9, $t18)], expr#20=['':VARCHAR], expr#21=['[a-zA-Z0-9]+'], expr#22=['<*>'], expr#23=[REGEXP_REPLACE($t9, $t21, $t22)], expr#24=[CASE($t19, $t20, $t23)], expr#25=[10], $f0=[$t24], email=[$t9], $f2=[$t25])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_account]])
