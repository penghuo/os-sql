calcite:
  logical: |
    LogicalSystemLimit(fetch=[10000], type=[QUERY_SIZE_LIMIT])
      LogicalProject(count()=[$1], span(birthdate,1m)=[$0])
        LogicalAggregate(group=[{0}], count()=[COUNT()])
          LogicalProject(span(birthdate,1m)=[SPAN($3, 1, 'm')])
            LogicalFilter(condition=[IS NOT NULL($3)])
              LogicalProject(account_number=[$0], firstname=[$1], address=[$2], birthdate=[$3], gender=[$4], city=[$5], lastname=[$6], balance=[$7], employer=[$8], state=[$9], age=[$10], email=[$11], male=[$12], _id=[$13], _index=[$14], _score=[$15], _maxscore=[$16], _sort=[$17], _routing=[$18])
                CalciteLogicalIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
  physical: |
    EnumerableLimit(fetch=[10000])
      EnumerableCalc(expr#0..1=[{inputs}], count()=[$t1], span(birthdate,1m)=[$t0])
        EnumerableAggregate(group=[{0}], count()=[COUNT()])
          EnumerableCalc(expr#0..19=[{inputs}], expr#20=[1], expr#21=['m'], expr#22=[SPAN($t3, $t20, $t21)], expr#23=[IS NOT NULL($t3)], span(birthdate,1m)=[$t22], $condition=[$t23])
            CalciteEnumerableIndexScan(table=[[OpenSearch, opensearch-sql_test_index_bank]])
